<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grip Simulator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  canvas { display: block; }

  #ui {
    position: absolute; top: 0; left: 0; width: 260px; height: 100vh;
    background: #121212; border-right: 1px solid #333; padding: 20px; z-index: 10;
    color: #e0e0e0;
  }
  h2 { font-size: 14px; color: #3d5afe; margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
  
  .global-section { border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
  label { font-size: 10px; color: #666; display: block; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
  
  select, input[type=range] { 
    width: 100%; margin-top: 5px; background: #1a1a1a; color: #fff; 
    border: 1px solid #333; padding: 8px; border-radius: 4px;
  }

  .tabs { display: flex; gap: 2px; margin-bottom: 15px; }
  .tab { 
    flex: 1; padding: 8px 0; background: #1a1a1a; border: 1px solid #333;
    color: #555; font-size: 10px; cursor: pointer; border-radius: 4px; font-weight: bold;
  }
  .tab.on { background: #3d5afe; color: #fff; border-color: #3d5afe; }

  .panel { display: none; }
  .panel.on { display: block; }

  .data-card { background: #1a1a1a; padding: 12px; border-radius: 6px; margin-top: 10px; border-left: 3px solid #3d5afe; }
  .data-val { font-size: 20px; font-weight: bold; color: #fff; }
  .data-lbl { font-size: 9px; color: #555; text-transform: uppercase; }

  .btn { 
    width: 100%; margin-top: 15px; padding: 12px; background: #3d5afe; 
    color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px;
  }

  .alert { margin-top: 10px; padding: 8px; border-radius: 4px; font-size: 11px; text-align: center; font-weight: bold; }
  .green { color: #4caf50; background: rgba(76, 175, 80, 0.1); }
  .red { color: #f44336; background: rgba(244, 67, 54, 0.1); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <h2>GRIP SIMULATOR</h2>
  
  <div class="global-section">
    <label>Surface</label>
    <select id="surfIn" onchange="update()">
      <option value="1.0">Tarmac</option>
      <option value="0.7">Gravel</option>
      <option value="0.4">Mud</option>
      <option value="0.1">Ice</option>
    </select>

    <label>Compound</label>
    <select id="tireIn" onchange="update()">
      <option value="1.0">Soft</option>
      <option value="0.8">Medium</option>
      <option value="0.6">Hard</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="switchTab('slope',this)">SLOPE</button>
    <button class="tab" onclick="switchTab('brake',this)">BRAKE</button>
    <button class="tab" onclick="switchTab('crash',this)">CRASH</button>
  </div>

  <div class="panel on" id="p-slope">
    <label>Angle: <span id="ang-txt">20</span>°</label>
    <input type="range" min="0" max="45" value="20" id="slopeIn" oninput="update()">
    <div id="s-alert" class="alert">Checking...</div>
  </div>

  <div class="panel" id="p-brake">
    <label>Speed: <span id="b-txt">60</span> km/h</label>
    <input type="range" min="20" max="150" value="60" id="brakeIn" oninput="update()">
    <div class="data-card">
      <div class="data-val" id="b-res">0m</div>
      <div class="data-lbl">Stopping Distance</div>
    </div>
    <button class="btn" onclick="startBrake()">RUN TEST</button>
  </div>

  <div class="panel" id="p-crash">
    <label>Impact Speed</label>
    <input type="range" min="10" max="120" value="50" id="crashIn" oninput="update()">
    <label>Seatbelt</label>
    <select id="beltIn" onchange="update()">
      <option value="1.0">Buckled</option>
      <option value="0.2">No Seatbelt</option>
    </select>
    <div class="data-card">
      <div class="data-val" id="c-res">100%</div>
      <div class="data-lbl">Safety Rating</div>
    </div>
    <button class="btn" onclick="startCrash()">TEST IMPACT</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); 
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 0.5);
sun.position.set(5, 10, 5);
scene.add(sun);

// --- CAR ---
const car = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 2.5), new THREE.MeshStandardMaterial({color: 0x3d5afe}));
body.position.y = 0.6; car.add(body);
const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.5, 1.1), new THREE.MeshStandardMaterial({color: 0xffffff, transparent:true, opacity:0.7}));
cabin.position.set(0, 1.1, 0.1); car.add(cabin);
const wheels = [];
const wGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 12);
const wMat = new THREE.MeshStandardMaterial({color: 0x111111});
[[-0.7,0.8],[0.7,0.8],[-0.7,-0.8],[0.7,-0.8]].forEach(p => {
  const w = new THREE.Mesh(wGeo, wMat);
  w.rotation.z = Math.PI/2;
  w.position.set(p[0], 0.35, p[1]);
  car.add(w); wheels.push(w);
});
scene.add(car);

// --- WORLD ---
const wall = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 1), new THREE.MeshStandardMaterial({color: 0x444444}));
wall.position.set(0, 2, -10);
scene.add(wall);

const roadGroup = new THREE.Group();
scene.add(roadGroup);
const tiles = [];
for(let i=0; i<10; i++) {
  const t = new THREE.Mesh(new THREE.PlaneGeometry(10, 15), new THREE.MeshStandardMaterial({color: 0x333333}));
  t.rotation.x = -Math.PI/2;
  t.position.z = i * -15;
  roadGroup.add(t); tiles.push(t);
}

// --- LOGIC ---
let tab = 'slope';
let speed = 0;
let isMoving = false;
const surfaceColors = { "1.0": 0x333333, "0.7": 0x6e5a42, "0.4": 0x3d2b1f, "0.1": 0xaaddff };

function switchTab(id, b) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  b.classList.add('on');
  document.getElementById('p-'+id).classList.add('on');
  tab = id;
  reset();
}

function reset() {
  speed = 0; isMoving = false;
  car.position.set(0,0,0); car.scale.set(1,1,1);
  update();
}

function update() {
  const mu = document.getElementById('surfIn').value * document.getElementById('tireIn').value;
  tiles.forEach(t => t.material.color.set(surfaceColors[document.getElementById('surfIn').value]));
  wall.visible = (tab === 'crash');

  if(tab === 'slope') {
    const ang = +document.getElementById('slopeIn').value;
    document.getElementById('ang-txt').innerText = ang;
    
    // Flipped rotation: Road slants AWAY from camera
    const rad = -(ang * Math.PI/180); 
    car.rotation.x = roadGroup.rotation.x = rad;
    
    const pull = Math.sin(Math.abs(rad));
    const grip = Math.cos(rad) * mu;
    const alert = document.getElementById('s-alert');
    if(pull > grip) {
      alert.innerText = "SLIDING"; alert.className = "alert red";
      speed = (pull - grip) * 12;
    } else {
      alert.innerText = "GRIP HOLDING"; alert.className = "alert green";
      speed = 0.4;
    }
  } else {
    car.rotation.x = roadGroup.rotation.x = 0;
  }

  if(tab === 'brake') {
    const s = +document.getElementById('brakeIn').value;
    document.getElementById('b-txt').innerText = s;
    document.getElementById('b-res').innerText = (0.5 * Math.pow(s/3.6, 2) / (9.8 * mu)).toFixed(1) + "m";
  }

  if(tab === 'crash') {
    const s = +document.getElementById('crashIn').value;
    const belt = +document.getElementById('beltIn').value;
    document.getElementById('c-res').innerText = Math.round(Math.max(0, 100 - (s * 0.8)) * belt) + "%";
  }
}

function startBrake() { speed = +document.getElementById('brakeIn').value / 10; isMoving = true; }
function startCrash() { car.position.z = 20; speed = +document.getElementById('crashIn').value / 10; isMoving = true; }

function animate() {
  requestAnimationFrame(animate);
  
  // Road scrolling
  tiles.forEach(t => {
    t.position.z += speed * 0.1;
    if(t.position.z > 15) t.position.z -= 150;
  });
  
  wheels.forEach(w => w.rotation.x += speed * 0.1);

  if(tab === 'brake' && isMoving) {
    speed *= 0.98;
    if(speed < 0.05) speed = 0;
  }
  
  if(tab === 'crash' && isMoving) {
    car.position.z -= speed * 0.1;
    if(car.position.z < -8.2) {
      car.position.z = -8.2; speed = 0; car.scale.z = 0.5; isMoving = false;
    }
  }

  camera.position.set(0, 4, 8);
  camera.lookAt(0, 1, -5);
  renderer.render(scene, camera);
}

update();
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
