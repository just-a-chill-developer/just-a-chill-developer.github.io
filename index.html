<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grip Simulator Pro - Physics & Safety</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  canvas { display: block; cursor: move; }

  #ui {
    position: absolute; top: 0; left: 0; width: 280px; height: 100vh;
    background: rgba(15, 15, 15, 0.98); border-right: 1px solid #333; padding: 20px; z-index: 10;
    color: #e0e0e0; pointer-events: auto; overflow-y: auto;
  }
  
  h2 { font-size: 13px; color: #3d5afe; margin-bottom: 15px; text-align: center; letter-spacing: 2px; font-weight: 800; border-bottom: 1px solid #333; padding-bottom: 10px; }
  .section { margin-bottom: 15px; }
  label { font-size: 9px; color: #777; display: block; margin-top: 8px; text-transform: uppercase; font-weight: bold; }
  
  select, input[type=range] { 
    width: 100%; margin-top: 4px; background: #222; color: #fff; 
    border: 1px solid #444; padding: 6px; border-radius: 4px; outline: none; font-size: 11px;
  }

  .tabs { display: flex; gap: 2px; margin-bottom: 15px; }
  .tab { 
    flex: 1; padding: 8px 0; background: #1a1a1a; border: 1px solid #333; 
    color: #555; font-size: 9px; cursor: pointer; border-radius: 4px; font-weight: bold; 
  }
  .tab.on { background: #3d5afe; color: #fff; border-color: #3d5afe; }
  
  .panel { display: none; }
  .panel.on { display: block; }
  
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .stat-box { background: #111; padding: 8px; border-radius: 4px; border: 1px solid #222; }
  .stat-val { font-family: monospace; font-size: 14px; color: #3d5afe; font-weight: bold; }
  .stat-lbl { font-size: 8px; color: #555; text-transform: uppercase; margin-top: 2px; }

  .btn { 
    width: 100%; margin-top: 15px; padding: 12px; background: #3d5afe; 
    color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase;
  }
  .alert { margin-top: 10px; padding: 8px; border-radius: 4px; font-size: 10px; text-align: center; font-weight: bold; min-height: 28px; }
  .red { color: #f44336; background: rgba(244, 67, 54, 0.1); border: 1px solid #f44336; }
  .green { color: #4caf50; background: rgba(76, 175, 80, 0.1); border: 1px solid #4caf50; }
  .death { color: #ff0000; background: rgba(255, 0, 0, 0.2); border: 1px solid #ff0000; text-transform: uppercase; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <h2>PHYSICS MONITOR</h2>
  
  <div class="section">
    <label>Global Friction ($\mu$)</label>
    <div class="stats-grid" style="grid-template-columns: 1fr;">
        <div class="stat-box"><div class="stat-val" id="mu-val">1.00</div><div class="stat-lbl">Combined Coeff</div></div>
    </div>
    <label>Surface</label>
    <select id="surfIn" onchange="update()">
      <option value="1.0">Tarmac (Dry)</option>
      <option value="0.7">Gravel</option>
      <option value="0.1">Ice</option>
    </select>
    <label>Tires</label>
    <select id="tireIn" onchange="update()">
      <option value="1.0">Racing Soft</option>
      <option value="0.7">All-Season</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tab on" id="t-slope" onclick="switchTab('slope')">SLOPE</button>
    <button class="tab" id="t-brake" onclick="switchTab('brake')">BRAKE</button>
    <button class="tab" id="t-crash" onclick="switchTab('crash')">CRASH</button>
  </div>

  <div class="panel on" id="p-slope">
    <label>Angle: <span id="ang-txt">20</span>°</label>
    <input type="range" min="0" max="45" value="20" id="slopeIn" oninput="update()">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="s-grav">0.34</div><div class="stat-lbl">Gravity (G)</div></div>
        <div class="stat-box"><div class="stat-val" id="s-fric">0.94</div><div class="stat-lbl">Tire Grip</div></div>
    </div>
    <div id="s-alert" class="alert">STABLE</div>
  </div>

  <div class="panel" id="p-brake">
    <label>Speed</label>
    <input type="range" min="20" max="180" value="100" id="brakeIn" oninput="update()">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="b-dist">0.0m</div><div class="stat-lbl">Stop Dist</div></div>
        <div class="stat-box"><div class="stat-val" id="b-time">0.0s</div><div class="stat-lbl">Stop Time</div></div>
    </div>
    <button class="btn" onclick="startBrake()">Test Brakes</button>
  </div>

  <div class="panel" id="p-crash">
    <label>Impact Velocity</label>
    <input type="range" min="20" max="220" value="120" id="crashIn" oninput="update()">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="c-force">0G</div><div class="stat-lbl">Impact G</div></div>
        <div class="stat-box"><div class="stat-val" id="c-health">100%</div><div class="stat-lbl">Chassis</div></div>
        <div class="stat-box" style="grid-column: span 2; border-color: #440000;">
            <div class="stat-val" id="c-death" style="color: #ff4444;">0%</div>
            <div class="stat-lbl">Fatality Risk</div>
        </div>
    </div>
    <div id="c-status" class="alert">READY FOR TEST</div>
    <button class="btn" onclick="startCrash()">Initialize Crash</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb); 
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 0.6);
sun.position.set(10, 20, 10);
scene.add(sun);

// --- CAR ---
const car = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 2.5), new THREE.MeshStandardMaterial({color: 0x3d5afe}));
body.position.y = 0.6; car.add(body);
const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.45, 1.2), new THREE.MeshStandardMaterial({color: 0xffffff, transparent:true, opacity:0.4}));
cabin.position.set(0, 1.1, 0.1); car.add(cabin);
scene.add(car);

const wall = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 2), new THREE.MeshStandardMaterial({color: 0x111111}));
wall.position.set(0, 2.5, -15); scene.add(wall);

const roadGroup = new THREE.Group();
scene.add(roadGroup);
const tiles = [];
for(let i=0; i<15; i++) {
  const t = new THREE.Mesh(new THREE.PlaneGeometry(15, 20), new THREE.MeshStandardMaterial({color: 0x222222}));
  t.rotation.x = -Math.PI/2; t.position.z = i * -20;
  roadGroup.add(t); tiles.push(t);
}

// --- PARTICLES ---
const particles = [];
function spawn(pos, color, count, speed) {
  for(let i=0; i<count; i++) {
    const p = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshBasicMaterial({color: color}));
    p.position.copy(pos);
    p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*speed, Math.random()*speed, (Math.random()-0.5)*speed), life: 1.0 };
    scene.add(p); particles.push(p);
  }
}

// --- CONTROLS ---
let camRotation = 0.5, isMouseDown = false;
window.addEventListener('mousedown', (e) => { if (!e.target.closest('#ui')) isMouseDown = true; });
window.addEventListener('mouseup', () => isMouseDown = false);
window.addEventListener('mousemove', (e) => { if(isMouseDown) camRotation -= e.movementX * 0.007; });

// --- LOGIC ---
let activeTab = 'slope', speed = 0, isMoving = false, camShake = 0;

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('t-'+id).classList.add('on');
  document.getElementById('p-'+id).classList.add('on');
  resetSim();
}

function resetSim() {
  speed = 0; isMoving = false; camShake = 0;
  car.position.set(0,0,0); car.scale.set(1,1,1);
  document.getElementById('c-health').innerText = "100%";
  document.getElementById('c-death').innerText = "0%";
  document.getElementById('c-force').innerText = "0G";
  document.getElementById('c-status').innerText = "READY FOR TEST";
  document.getElementById('c-status').className = "alert";
  update();
}

function update() {
  const mu = parseFloat(document.getElementById('surfIn').value) * parseFloat(document.getElementById('tireIn').value);
  document.getElementById('mu-val').innerText = mu.toFixed(2);
  wall.visible = (activeTab === 'crash');
  
  if(activeTab === 'slope') {
    const ang = +document.getElementById('slopeIn').value;
    document.getElementById('ang-txt').innerText = ang;
    const rad = -(ang * Math.PI/180);
    car.rotation.x = roadGroup.rotation.x = rad;
    const gravityG = Math.sin(Math.abs(rad));
    const frictionG = Math.cos(rad) * mu;
    document.getElementById('s-grav').innerText = gravityG.toFixed(2);
    document.getElementById('s-fric').innerText = frictionG.toFixed(2);
    if(gravityG > frictionG) {
      speed = (gravityG - frictionG) * 20;
      document.getElementById('s-alert').innerText = "SLIDING";
      document.getElementById('s-alert').className = "alert red";
    } else {
      speed = 0.3;
      document.getElementById('s-alert').innerText = "STABLE";
      document.getElementById('s-alert').className = "alert green";
    }
  } else { car.rotation.x = roadGroup.rotation.x = 0; }

  if(activeTab === 'brake') {
    const vKmh = +document.getElementById('brakeIn').value;
    const vMs = vKmh / 3.6;
    document.getElementById('b-dist').innerText = ((vMs * vMs) / (2 * 9.81 * mu)).toFixed(1) + "m";
    document.getElementById('b-time').innerText = (vMs / (9.81 * mu)).toFixed(1) + "s";
  }
}

function startBrake() { speed = +document.getElementById('brakeIn').value / 10; isMoving = true; }
function startCrash() { car.position.z = 30; speed = +document.getElementById('crashIn').value / 10; isMoving = true; resetSim(); isMoving = true; speed = +document.getElementById('crashIn').value / 10;}

function animate() {
  requestAnimationFrame(animate);

  for(let i = particles.length-1; i>=0; i--) {
    const p = particles[i]; p.position.add(p.userData.vel); p.userData.life -= 0.02;
    p.scale.setScalar(p.userData.life);
    if(p.userData.life <= 0) { scene.remove(p); particles.splice(i,1); }
  }

  tiles.forEach(t => {
    t.position.z += speed * 0.2;
    if(t.position.z > 20) t.position.z -= 300;
  });

  if(activeTab === 'brake' && isMoving) {
    speed *= 0.98;
    if(speed < 0.05) speed = 0;
  }
  
  if(activeTab === 'crash' && isMoving) {
    car.position.z -= speed * 0.2;
    if(car.position.z < -13.5) {
      const impactSpeed = (+document.getElementById('crashIn').value) / 3.6;
      const gForce = (impactSpeed * impactSpeed) / (2 * 0.6 * 9.81); 
      let deathChance = 0;
      if (gForce > 25) deathChance = Math.min(100, Math.pow((gForce - 25) / 55, 2) * 100);
      
      document.getElementById('c-force').innerText = Math.round(gForce) + "G";
      document.getElementById('c-health').innerText = Math.max(0, Math.round(100 - (gForce/1.4))) + "%";
      document.getElementById('c-death').innerText = Math.round(deathChance) + "%";
      
      const status = document.getElementById('c-status');
      if(deathChance > 70) { status.innerText = "FATAL COLLISION"; status.className = "alert death"; }
      else if(deathChance > 20) { status.innerText = "CRITICAL INJURIES"; status.className = "alert red"; }
      else { status.innerText = "SURVIVABLE"; status.className = "alert green"; }

      car.position.z = -13.5; speed = 0; car.scale.z = 0.35; isMoving = false;
      camShake = Math.min(2.0, gForce / 40);
      spawn(new THREE.Vector3(0,1,-14), 0xff6600, 50, 1.2); 
      spawn(new THREE.Vector3(0,1,-14), 0x333333, 30, 0.6);
      if(deathChance > 80) spawn(new THREE.Vector3(0,1.5,-14), 0xff0000, 15, 0.5);
    }
  }

  camera.position.set(Math.sin(camRotation)*15, 6, Math.cos(camRotation)*15);
  if(camShake > 0) {
    camera.position.x += (Math.random()-0.5)*camShake;
    camera.position.y += (Math.random()-0.5)*camShake;
    camShake *= 0.92;
  }
  camera.lookAt(0, 1, 0);
  renderer.render(scene, camera);
}

update(); animate();
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
